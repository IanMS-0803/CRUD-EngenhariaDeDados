<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD Universidade</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Menu Lateral -->
    <div class="sidebar" style="display: flex; gap: 10px; margin-bottom: 20px; padding: 10px; background: #f0f0f0;">
        <button data-entidade="usuario" class="active" onclick="selecionarEntidade('usuario')">Usuários</button>
        <button data-entidade="curso" onclick="selecionarEntidade('curso')">Cursos</button>
        <button data-entidade="estudante" onclick="selecionarEntidade('estudante')">Estudantes</button>
        <button data-entidade="vinculo" onclick="selecionarEntidade('vinculo')">Vínculos</button>
    </div>

    <!-- Área Principal -->
    <div class="content" style="padding: 10px;">
        <!-- Barra de Ações (Os botões que estavam faltando) -->
        <div class="actions" style="margin-bottom: 20px; display: flex; gap: 10px;">
            <input type="text" id="txt-busca" placeholder="Buscar na tabela..." style="padding: 5px; flex-grow: 1;">
            <button id="open-add-modal" style="background: green; color: white; padding: 5px 10px;">Adicionar</button>
            <button id="open-edit-modal" style="background: blue; color: white; padding: 5px 10px;">Editar</button>
            <button id="execute-delete" style="background: red; color: white; padding: 5px 10px;">Deletar</button>
        </div>

        <!-- Tabela onde os dados vão aparecer -->
        <table border="1" width="100%" style="border-collapse: collapse; text-align: left;">
            <thead>
                <tr id="cabecalho-tabela" style="background: #ddd;"></tr>
            </thead>
            <tbody id="corpo-tabela"></tbody>
        </table>
    </div>

    <!-- Modal (A janelinha de formulário que abre para inserir/editar) -->
    <div id="modal-formulario" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center;">
        <div style="background: white; padding: 20px; border-radius: 8px; min-width: 300px;">
            <h2 id="modal-titulo">Formulário</h2>
            <form id="form-usuario">
                <div id="campos-formulario" style="display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px;">
                    <!-- O JavaScript injeta os inputs aqui automaticamente -->
                </div>
                <div style="display: flex; justify-content: space-between;">
                    <button type="button" id="close-modal" style="padding: 5px;">Cancelar</button>
                    <button type="submit" style="padding: 5px; background: green; color: white;">Salvar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Link para o seu arquivo JavaScript que faz tudo funcionar -->
    <script src="app.js"></script>
</body>
</html>
